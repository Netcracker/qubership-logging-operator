name: Go test with Sonar
on:
  push: {}
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sonar-project-key: ${{ steps.config.outputs.sonar-project-key }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Resolve sonar project key based on restricted actors
        id: config
        env:
          ACTOR: ${{ github.actor }}
        run: |
          restricted=$(python3 -c "
          import yaml, os
          with open('.github/config/build-config.yaml') as f:
              config = yaml.safe_load(f)
          actors = config.get('restricted-actors', [])
          print('true' if os.environ['ACTOR'] in actors else 'false')
          ")
          if [ "$restricted" = "true" ]; then
            echo "sonar-project-key=" >> "$GITHUB_OUTPUT"
          else
            echo "sonar-project-key=${{ vars.SONAR_PROJECT_KEY }}" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: prepare
    name: Build and test with coverage
    uses: Netcracker/qubership-core-infra/.github/workflows/generic-go-build.yaml@bc2a0bd082147e23b4091616c608a21cc2957728 # v2.4.1
    with:
      go-module-dir: '.'
      sonar-project-key: ${{ needs.prepare.outputs.sonar-project-key }}
      cover-packages: './controllers/...'
      skip-docker: true
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write
      packages: write

  render-fluentbit-configs:
    name: Render FluentBit configs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: go.mod

      - name: Render FluentBit resources
        env:
          FLUENTBIT_RENDER_OUTPUT_DIR: ${{ github.workspace }}/rendered/fluentbit
          FLUENTBIT_AGGREGATOR_RENDER_OUTPUT_DIR: ${{ github.workspace }}/rendered/fluentbit-aggregator
        run: |
          go test -count=1 ./controllers/fluentbit ./controllers/fluentbit-forwarder-aggregator

      - name: Add rendered configs to summary
        run: |
          echo "## Rendered FluentBit resources" >> "$GITHUB_STEP_SUMMARY"
          files=(rendered/fluentbit/*.yaml rendered/fluentbit-aggregator/*.yaml)
          if [ ! -e "${files[0]}" ]; then
            echo "No rendered FluentBit resources found" >&2
            exit 1
          fi
          for file in "${files[@]}"; do
            echo "### ${file}" >> "$GITHUB_STEP_SUMMARY"
            echo '```yaml' >> "$GITHUB_STEP_SUMMARY"
            cat "$file" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          done
