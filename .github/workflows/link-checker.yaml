---
name: "Lint: Check links in documentation"

on:
  workflow_dispatch: {}
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - 'docs/**'
      - '*.md'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '*.md'

permissions:
  contents: read

jobs:
  linkChecker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Restore lychee cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        id: restore-cache
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.run_id }}
          restore-keys: cache-lychee-
      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: >-
            './**/*.md'
            --verbose
            --no-progress
            --user-agent 'Mozilla/5.0 (X11; Linux x86_64) Chrome/134.0.0.0'
            --retry-wait-time 60
            --max-retries 8
            --accept 100..=103,200..=299,302,403,429
            --cookie-jar cookies.json
            --exclude-all-private
            --max-concurrency 4
            --cache
            --cache-exclude-status '429, 500..502'
            --max-cache-age 1d
          format: markdown
          fail: true
      - name: Save lychee cache
        if: ${{ always() && steps.restore-cache.outputs.cache-hit != 'true' && hashFiles('.lycheecache/**') != '' }}
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.run_id }}
