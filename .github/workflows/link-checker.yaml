---
name: Link Checker

on:
  push: null
  repository_dispatch: null
  workflow_dispatch: null
  pull_request:
    branches: [main]
    types:
      [opened, reopened, synchronize]
permissions:
  contents: read
jobs:
  linkChecker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore lychee cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        id: restore-cache
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.run_id }}
          restore-keys: cache-lychee-

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: >-
            './**/*.md'
            --verbose
            --no-progress
            --user-agent 'Mozilla/5.0 (X11; Linux x86_64) Chrome/134.0.0.0'
            --retry-wait-time 60
            --max-retries 8
            --accept 100..=103,200..=299,302,429
            --cookie-jar cookies.json
            --exclude-all-private
            --exclude '^https://docs\.openshift\.com/container-platform/4\.12/release_notes/ocp-4-12-release-notes\.html$'
            --max-concurrency 4
            --cache
            --cache-exclude-status '403, 429, 500..502'
            --max-cache-age 1d
          format: markdown
          fail: true

      - name: Save lychee cache
        if: always()
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.run_id }}
