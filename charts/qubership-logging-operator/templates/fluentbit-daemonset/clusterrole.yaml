{{- if .Values.createClusterAdminEntities }}
{{- if .Values.fluentbit.install }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Namespace }}-fluentbit
  {{- if .Values.fluentbit.annotations }}
  annotations:
    {{- toYaml .Values.fluentbit.annotations | nindent 4 }}
  {{- end }}
  labels:
    {{- include "logging.labels" (dict "ctx" . "name" (printf "%s-fluentbit" .Release.Namespace) "component" "fluentbit") | nindent 4 }}
    {{- if .Values.fluentbit.labels }}
    {{- include "logging.extraLabels" (dict "ctx" . "extraLabels" .Values.fluentbit.labels) | nindent 4 }}
    {{- end }}
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - namespaces
      - events
      - endpoints
      - nodes
      - nodes/proxy
    verbs:
      - get
      - list
      - watch
  {{- if $.Capabilities.APIVersions.Has "policy/v1beta1" }}
  - apiGroups:
      - policy
    resources:
      - podsecuritypolicies
    verbs:
      - use
    resourceNames:
      - {{ .Values.fluentbit.securityResources.name }}
  - apiGroups:
      - extensions
    resources:
      - podsecuritypolicies
    verbs:
      - use
    resourceNames:
      - {{ .Values.fluentbit.securityResources.name }}
  {{- end }}
{{- end }}
{{- end }}
