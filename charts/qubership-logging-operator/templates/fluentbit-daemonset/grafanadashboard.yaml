{{- if .Values.fluentbit.install }}
apiVersion: integreatly.org/v1alpha1
kind: GrafanaDashboard
metadata:
  name: fluentbit-metrics-v1
  labels:
    {{- include "logging.labels" (dict "ctx" . "name" "fluentbit-metrics-v1" "component" "monitoring") | nindent 4 }}
    app.kubernetes.io/processed-by-operator: grafana-operator
    {{- if .Values.fluentbit.labels }}
    {{- include "logging.extraLabels" (dict "ctx" . "extraLabels" .Values.fluentbit.labels) | nindent 4 }}
    {{- end }}
  {{- if .Values.fluentbit.annotations }}
  annotations:
    {{- toYaml .Values.fluentbit.annotations | nindent 4 }}
  {{- end }}
spec:
  json: |
{{ .Files.Get "monitoring/fluentbit-dashboard.json" | indent 4 }}
{{- end }}
