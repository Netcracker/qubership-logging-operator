{{- if .Values.createClusterAdminEntities }}
{{- if .Values.graylog.install }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Namespace }}-psp-oob-privileged
  {{- if .Values.graylog.annotations }}
  annotations:
    {{- toYaml .Values.graylog.annotations | nindent 4 }}
  {{- end }}
  labels:
    {{- include "logging.labels" (dict "ctx" . "name" (printf "%s-psp-oob-privileged" .Release.Namespace) "component" "graylog") | nindent 4 }}
    {{- if .Values.graylog.labels }}
    {{- include "logging.extraLabels" (dict "ctx" . "extraLabels" .Values.graylog.labels) | nindent 4 }}
    {{- end }}
rules:
  {{- if .Values.graylog.securityResources.install }}
  {{- if .Capabilities.APIVersions.Has "policy/v1beta1" }}
  - apiGroups:
      - extensions
    resources:
      - podsecuritypolicies
    resourceNames:
      - oob-privileged-psp # the psp we are giving access to
    verbs:
      - use
  {{- else if or .Values.openshiftDeploy (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
  - apiGroups:
      - security.openshift.io
    resources:
      - securitycontextconstraints
    verbs:
      - use
    resourceNames:
      - {{ .Values.graylog.securityResources.name }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
