{{- if .Values.createClusterAdminEntities }}
{{- if .Values.graylog.install }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Namespace }}-psp-oob-privileged
  {{- if .Values.graylog.annotations }}
  annotations:
    {{- toYaml .Values.graylog.annotations | nindent 4 }}
  {{- end }}
  labels:
    {{- include "logging.labels" (dict "ctx" . "name" (printf "%s-psp-oob-privileged" .Release.Namespace) "component" "graylog") | nindent 4 }}
    {{- if .Values.graylog.labels }}
    {{- include "logging.extraLabels" (dict "ctx" . "extraLabels" .Values.graylog.labels) | nindent 4 }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole # Must be Role or ClusterRole
  name: {{ .Release.Namespace }}-psp-oob-privileged # The name of the ClusterRole to bind to
subjects:
  - kind: ServiceAccount
    name: logging-graylog
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
