{{- if .Values.graylog.install }}
apiVersion: integreatly.org/v1alpha1
kind: GrafanaDashboard
metadata:
  name: graylog-grafana-dashboard-k8s
  labels:
    {{- include "logging.labels" (dict "ctx" . "name" "graylog-grafana-dashboard-k8s" "component" "monitoring") | nindent 4 }}
    app.kubernetes.io/processed-by-operator: grafana-operator
    {{- if .Values.graylog.labels }}
    {{- include "logging.extraLabels" (dict "ctx" . "extraLabels" .Values.graylog.labels) | nindent 4 }}
    {{- end }}
  {{- if .Values.graylog.annotations }}
  annotations:
    {{- toYaml .Values.graylog.annotations | nindent 4 }}
  {{- end }}
spec:
  json: |
{{ .Files.Get "monitoring/graylog-dashboard.json" | indent 4 }}
{{- end }}
