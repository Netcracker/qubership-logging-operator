{{- if .Values.graylog.install }}
{{- if .Values.graylog.createIngress }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: graylog
  labels:
    {{- include "logging.labels" (dict "ctx" . "name" "graylog" "component" "graylog") | nindent 4 }}
    deployment.netcracker.com/ingress-type: {{ .Values.graylog.ingressLabels.ingressType | default "public-network" | quote }}
    deployment.netcracker.com/ingress-audience-type: {{ .Values.graylog.ingressLabels.ingressAudienceType | default "ops-user" | quote }}
    {{- if .Values.graylog.labels }}
    {{- include "logging.extraLabels" (dict "ctx" . "extraLabels" .Values.graylog.labels) | nindent 4 }}
    {{- end }}
  {{- if .Values.graylog.annotations }}
  annotations:
    {{- toYaml .Values.graylog.annotations | nindent 4 }}
  {{- end }}
  {{- if and .Values.graylog.httpRoute.install .Values.graylog.addIngressIgnoreAnnotation }}
    gateway-api-converter.netcracker.com/ignore: "true"
  {{- end }}
  {{- if and .Values.graylog.tls .Values.graylog.tls.http .Values.graylog.tls.http.enabled }}
    nginx.ingress.kubernetes.io/backend-protocol: HTTPS
  {{- end }}
spec:
  {{- if and .Values.graylog.tls .Values.graylog.tls.http .Values.graylog.tls.http.enabled }}
  tls:
    - hosts:
      - {{ regexFind "([-a-zA-Z\\d]+\\.)+([-a-zA-Z\\d])+" (include "graylog.host" .) }}
      secretName: {{ include "graylog.secretName" . }}
  {{- end }}
  {{- if .Values.graylog.ingressClassName }}
  ingressClassName: {{ .Values.graylog.ingressClassName }}
  {{- end }}
  rules:
    - host: {{ regexFind "([-a-zA-Z\\d]+\\.)+([-a-zA-Z\\d])+" (include "graylog.host" .) }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: graylog-service
                port:
                  number: 9000
{{- end }}
{{- end }}
