{{- if .Values.integrationTests.install }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.integrationTests.service.name }}
  labels:
    {{- include "logging.labels" (dict "ctx" . "name" .Values.integrationTests.service.name "component" "integration-tests") | nindent 4 }}
    app.kubernetes.io/instance: {{ cat .Values.integrationTests.service.name "-" .Release.Namespace | nospace | trunc 63 | trimSuffix "-" }}
    {{- $image := include "logging-integration-tests.image" . }}
    app.kubernetes.io/version: {{ splitList ":" $image | last | quote }}
    app.kubernetes.io/technology: python
    {{- if .Values.integrationTests.labels }}
    {{- include "logging.extraLabels" (dict "ctx" . "extraLabels" .Values.integrationTests.labels) | nindent 4 }}
    {{- end }}
  {{- if .Values.integrationTests.annotations }}
  annotations:
    {{- toYaml .Values.integrationTests.annotations | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels:
      name: {{ .Values.integrationTests.service.name }}
  strategy:
    type: Recreate
  replicas: 1
  template:
    metadata:
      labels:
        {{- include "logging.labels" (dict "ctx" . "name" .Values.integrationTests.service.name "component" "integration-tests") | nindent 8 }}
        app.kubernetes.io/instance: {{ cat .Values.integrationTests.service.name "-" .Release.Namespace | nospace | trunc 63 | trimSuffix "-" }}
        {{- $image := include "logging-integration-tests.image" . }}
        app.kubernetes.io/version: {{ splitList ":" $image | last | quote }}
        app.kubernetes.io/technology: python
        {{- if .Values.integrationTests.labels }}
        {{- include "logging.extraLabels" (dict "ctx" . "extraLabels" .Values.integrationTests.labels) | nindent 8 }}
        {{- end }}
      {{- if .Values.integrationTests.annotations }}
      annotations:
        {{- toYaml .Values.integrationTests.annotations | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ .Values.integrationTests.service.name }}
      {{- if .Values.integrationTests.affinity }}
      affinity:
        {{ .Values.integrationTests.affinity | toJson }}
      {{- end }}
      {{- if .Values.integrationTests.priorityClassName }}
      priorityClassName: {{ .Values.integrationTests.priorityClassName }}
      {{- end }}
      containers:
        - name: {{ .Values.integrationTests.service.name }}
          image: {{ template "logging-integration-tests.image" . }}
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: TAGS
              value: {{ .Values.integrationTests.tags }}
            - name: TIMEOUT_BEFORE_START
              value: {{ .Values.integrationTests.timeoutBeforeStart | quote }}
            - name: EXTERNAL_GRAYLOG_SERVER
              value: {{ .Values.integrationTests.externalGraylogServer | quote  }}
            - name: GRAYLOG_PROTOCOL
              value: {{ .Values.integrationTests.graylogProtocol }}
            - name: GRAYLOG_HOST
              value: {{ .Values.integrationTests.graylogHost }}
            - name: GRAYLOG_PORT
              value: {{ .Values.integrationTests.graylogPort | quote }}
            - name: LOGGING_PROJECT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: INTEGRATION_TESTS_SECRETS_DIR
              value: /run/secrets/integration-tests
            - name: GRAYLOG_INSTALL
              value: {{ .Values.graylog.install | quote }}
          {{- if .Values.integrationTests.victorialogs.url }}
            - name: VICTORIALOGS_URL
              value: {{ .Values.integrationTests.victorialogs.url | quote }}
          {{- end }}
          {{- if .Values.integrationTests.victorialogs.auth }}
          {{- if .Values.integrationTests.victorialogs.auth.token }}
            - name: VL_TOKEN_FILE
              value: /run/secrets/vl-token/vl_token
          {{- end }}
          {{- if and .Values.integrationTests.victorialogs.auth.user .Values.integrationTests.victorialogs.auth.password }}
            - name: VL_USER_FILE
              value: /run/secrets/vl-http-user/vl_user
            - name: VL_PASSWORD_FILE
              value: /run/secrets/vl-http-password/vl_password
          {{- end }}
          {{- end }}
            - name: OPERATION_RETRY_INTERVAL
              value: {{ .Values.integrationTests.operationRetryInterval | default "5s" | quote }}
            - name: OPERATION_RETRY_COUNT
              value: {{ .Values.integrationTests.operationRetryInterval | default "60x" | quote }}
            - name: OPENSHIFT_DEPLOY
              value: {{ (.Capabilities.APIVersions.Has "security.openshift.io/v1") | default "false" | quote }}
            - name: STATUS_WRITING_ENABLED
              value: {{ .Values.integrationTests.statusWriting.enabled | quote }}
            - name: ONLY_INTEGRATION_TESTS
              value: {{ .Values.integrationTests.statusWriting.onlyIntegrationTests | quote }}
            - name: IS_SHORT_STATUS_MESSAGE
              value: {{ .Values.integrationTests.statusWriting.isShortStatusMessage | quote }}
            - name: STATUS_CUSTOM_RESOURCE_PATH
              value: {{ toYaml .Values.integrationTests.statusWriting.customResourcePath }}
            - name: IS_STATUS_BOOLEAN
              value: "true"
          volumeMounts:
            - name: integration-credentials
              mountPath: /run/secrets/integration-tests
              readOnly: true
          {{- if .Values.integrationTests.victorialogs.auth }}
          {{- if .Values.integrationTests.victorialogs.auth.token }}
            - name: vl-token
              mountPath: /run/secrets/vl-token
              readOnly: true
          {{- end }}
          {{- if and .Values.integrationTests.victorialogs.auth.user .Values.integrationTests.victorialogs.auth.password }}
            - name: vl-http-user
              mountPath: /run/secrets/vl-http-user
              readOnly: true
            - name: vl-http-password
              mountPath: /run/secrets/vl-http-password
              readOnly: true
          {{- end }}
          {{- end }}
          resources:
            requests:
              memory: {{ default "128Mi" .Values.integrationTests.resources.requests.memory }}
              cpu: {{ default "100m" .Values.integrationTests.resources.requests.cpu }}
            limits:
              memory: {{ default "256Mi" .Values.integrationTests.resources.limits.memory }}
              cpu: {{ default "200m" .Values.integrationTests.resources.limits.cpu }}
          terminationMessagePath: /dev/termination-log
          imagePullPolicy: IfNotPresent
      volumes:
        - name: integration-credentials
          secret:
            secretName: {{ .Values.integrationTests.service.name }}-secret
      {{- if .Values.integrationTests.victorialogs.auth }}
      {{- if .Values.integrationTests.victorialogs.auth.token }}
        - name: vl-token
          secret:
            secretName: {{ .Values.integrationTests.victorialogs.auth.token.secretName | default "victorialogs-auth-secret" }}
            optional: true
            items:
              - key: {{ .Values.integrationTests.victorialogs.auth.token.key | default "token" }}
                path: vl_token
      {{- end }}
      {{- if and .Values.integrationTests.victorialogs.auth.user .Values.integrationTests.victorialogs.auth.password }}
        - name: vl-http-user
          secret:
            secretName: {{ .Values.integrationTests.victorialogs.auth.user.secretName | default "victorialogs-http-secret" }}
            optional: true
            items:
              - key: {{ .Values.integrationTests.victorialogs.auth.user.key | default "username" }}
                path: vl_user
        - name: vl-http-password
          secret:
            secretName: {{ .Values.integrationTests.victorialogs.auth.password.secretName | default "victorialogs-http-secret" }}
            optional: true
            items:
              - key: {{ .Values.integrationTests.victorialogs.auth.password.key | default "password" }}
                path: vl_password
      {{- end }}
      {{- end }}
{{- end }}
