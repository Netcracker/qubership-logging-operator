# Default values for Logging service.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Provide a name of CR
name: logging

# -- Specifies whether a cluster-admin entities should be created.
createClusterAdminEntities: true

# -- Cloud address. Openshift cloud may require to set the current host address.
cloudURL: "https://kubernetes.default.svc"

# -- Operating system kind on cloud nodes: centos/rhel/oracle/ubuntu
osKind: centos

# -- Set to 'true' to deploy to IPv6 environment.
ipv6: false

# -- Cloud containers runtime type: docker/cri-o/containerd/etc
# @default -- "containerd"
# containerRuntimeType: containerd

# -- Image of logging-operator
# operatorImage: ghcr.io/netcracker/qubership-logging-operator:main

# -- The log level of operator logs.
logLevel: info

# -- If specified, the pod's scheduling constraints
# Ref: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.35/#affinity-v1-core
affinity: {}

# -- PriorityClassName assigned to the Pods to prevent them from evicting.
# priorityClassName: "priorityClassName"

# -- Annotations is an unstructured key value map stored
# with a resource that may be set by external tools to store and retrieve arbitrary metadata.
# They are not queryable and should be preserved when modifying objects.
# Ref: https://kubernetes.io/docs/user-guide/annotations
annotations: {}

# -- Map of string keys and values that can be used to organize and categorize (scope and select) objects.
# May match selectors of replication controllers and services.
# Ref: https://kubernetes.io/docs/user-guide/labels
labels: {}

# -- logging-operator pprof
pprof:
  # -- Indicates if logging-operator has pprof enabled.
  install: true
  # -- Port of pprof which use in container
  containerPort: 9180

  # -- Service configuration for pprof service
  service:
    # -- Type of pprof service
    type: ClusterIP
    # -- Port of pprof which use in service
    port: 9180
    # -- Port name of pprof which use in service
    portName: pprof

    # -- Annotations set which will create in service
    annotations: {}
    # -- Labels set which will create in service
    labels: {}

# -- Allow disabling create MetricsService during deploy
# skipMetricsService: false

# -- Resources for logging-operator
resources:
  requests:
    cpu: 25m
    memory: 50Mi
  limits:
    cpu: 150m
    memory: 100Mi

# -- Pod monitor for logging-operator
podMonitor:
  # -- Allow change metrics scrape timeout
  scrapeTimeout: 10s
  # -- Allow change metrics scrape interval
  scrapeInterval: 30s

# -- Liveness probe for logging-operator
livenessProbe:
  httpGet:
    path: /health
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# -- Readiness probe for logging-operator
readinessProbe:
  httpGet:
    path: /ready
    port: 8081
  initialDelaySeconds: 3
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# -- Mandatory values for Graylog.
# @default -- {}
graylog:

  ################################################# Graylog deployment #################################################

  # -- Allow disabling create Graylog during deploy
  install: false

  # -- A docker image to use for graylog deployment.
  # dockerImage: "ghcr.io/netcracker/graylog:5.2.7"

  # -- A number of replicas for Graylog.
  replicas: 1

  # -- A docker image of MongoDB to use for graylog deployment.
  # mongodbImage: mongo:5.0.19

  # -- A docker image to initialize plugins for Graylog
  # initContainerDockerImage: ghcr.io/netcracker/graylog-plugins-init-container:main

  # -- A docker image for init container for Graylog
  # initSetupImage: alpine:3.23.3

  # -- Mongo PVC name.
  mongoPersistentVolume: ""

  # -- Mongo PVC storage class name.
  mongoStorageClassName: ""

  # -- Graylog PVC name.
  graylogPersistentVolume: ""

  # -- Graylog PVC storage class name.
  graylogStorageClassName: ""

  # -- Storage size, e.g. '2Gi'
  storageSize: 2Gi

  # -- The resources describe to compute resource requests and limits for single Pods.
  # Ref: https://kubernetes.io/docs/user-guide/compute-resources/
  graylogResources:
    requests:
      cpu: 500m
      memory: 1536Mi
    limits:
      cpu: 1000m
      memory: 2048Mi

  # -- The resources describe to compute resource requests and limits for single Pods.
  # Ref: https://kubernetes.io/docs/user-guide/compute-resources/
  mongoResources:
    requests:
      cpu: 500m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 256Mi

  # -- The resources describe to compute resource requests and limits for single Pods.
  # Ref: https://kubernetes.io/docs/user-guide/compute-resources/
  initResources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi

  # -- If specified, the pod's scheduling constraints
  # Ref: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.35/#affinity-v1-core
  affinity: {}

  # -- Allow defines the key of the node selector.
  # nodeSelectorKey: role

  # -- Allow defines the value of the node selector key.
  # nodeSelectorValue: compute

  # -- Allow creating security resources as PodSecurityPolicy, SecurityContextConstraints
  securityResources:
    install: false
    name: logging-graylog

  # -- PriorityClassName assigned to the Pods to prevent them from evicting.
  # priorityClassName: "<priorityClassName>"

  # -- Graylog server java opts.
  # javaOpts: -Xms1024m -Xmx1024m

  # -- The amount of time the operator waits for a Graylog pod to start, in minutes
  # @default -- 10
  # startupTimeout: 10

  ############################################### Ingress configuration ################################################

  # -- Indicates if Ingress need to be created.
  createIngress: true

  # -- The Graylog host for ingress. For example: https://graylog-service.kubernetes.cloud.org/
  # host:

  # -- The name of an IngressClass cluster resource.
  # ingressClassName:

  # -- Netcracker labels for Ingress (only on kind: Ingress, not OpenShift Route).
  ingressLabels:
    # -- private-network = intranet; public-network = internet
    ingressType: public-network
    # -- dev-user | ops-user | conf-user | end-user
    ingressAudienceType: ops-user

  ############################################## HTTPRoute configuration ###############################################

  # -- HTTPRoute-specific configuration through Gateway API.
  httpRoute:
    # -- Enables / disables deploy of HTTPRoute for Graylog
    install: false

    # -- Hostnames for graylog UI. If not set then host from ingress configuration will be used.
    hostnames: []

    # -- Custom HTTPRoute rules to define routing behavior.
    # If set, these rules are used in the HTTPRoute spec.rules block.
    # If not set or empty, a single default rule is used:
    #   - matches path with type PathPrefix and / value
    #   - backendRefs to graylog:9000
    # Ref: https://gateway-api.sigs.k8s.io/reference/spec/#httprouterule
    rules: []

    # -- List of Gateway references this HTTPRoute should bind to.
    # Each item describes a parent Gateway (via group, kind, name, namespace, and sectionName).
    # If empty, the HTTPRoute is still created but will not be attached to any Gateway listeners.
    parentRefs: []
      # - group: gateway.networking.k8s.io
      #   kind: Gateway
      #   name: my-gateway
      #   namespace: gateway-infra
      #   sectionName: http

  ############################################# Graylog 4 -> 5  migration ##############################################

  # -- Activates automatic step-by-step upgrade of the MongoDB database.
  # Can be used only for migration from Graylog 4 to 5.
  mongoUpgrade: false

  ############################################ Service monitor configuration ###########################################

  # -- Service monitor for graylog
  serviceMonitor:
    # -- Allow change metrics scrape timeout
    scrapeTimeout: 10s
    # -- Allow change metrics scrape interval
    scrapeInterval: 30s

  ############################################### Graylog configuration ################################################

  # -- (Deprecated) Use configuration for OpenSearch below-mentioned instead of Elasticsearch.
  # Elasticsearch host, example: http://user:password@elasticsearch.elasticsearch-cluster:9200
  # elasticsearchHost:

  # -- Configuration for TLS enabling for OpenSearch.
  # openSearch:
  #   url: OpenSearch url
  #   http:
  #     credentials:
  #       username:
  #         key: user
  #         name: secret-name
  #       password:
  #         key: password
  #         name: secret-name
  #   tlsConfig:
  #     insecureSkipVerify: false
  #     ca:
  #       key: cert-ca.pem
  #       name: secret-certificate-authority
  #     cert:
  #       key: cert.crt
  #       name: secret-certificate
  #     pkey:
  #       key: cert.key
  #       name: secret-certificate

  # -- The number of Elasticsearch replicas used per index.
  # @default -- 1
  # indexReplicas: 1

  # -- The number of Elasticsearch shards used per index.
  # @default -- 4
  # indexShards: 4

  # -- Set max size for the default index in case
  # maxSize: ""

  # -- Set max number of indices in the default index-set
  # maxNumberOfIndices: ""

  # -- Configuration for enable streams. System and audit logs will be created by default if the section is empty.
  # List of default streams:
  #   "System logs", "Audit logs", "Kubernetes events", "Integration logs", "Access logs", "Nginx logs", "Bill Cycle logs".
  streams: []
  # - name: "Audit logs"
  #   install: true
  #   rotationStrategy: "timeBased"
  #   rotationPeriod: "P1M"
  #   maxSize: 1073741824
  #   maxNumberOfIndices: 5
  # - name: "Kubernetes events"
  #   install: true
  #   rotationStrategy: "timeBased"
  #   rotationPeriod: "P1M"
  #   maxNumberOfIndices: 5

  # -- The Graylog content deploy policy (streams, inputs, grok patterns, and so on). The possible values are:
  # - only-create - Only the creation of missing content, without updating the existing content.
  # - force-update - Forcibly updating out-of-the-box content. If the content does not exist, it is created.
  # - skip - Skip all the content create/update tasks.
  # @default -- "only-create".
  # contentDeployPolicy: only-create

  # -- (Deprecated) Use "contentPack" instead of "contentPackPaths". Graylog content pack path.
  contentPackPaths: ""

  # -- Graylog content packs.
  contentPack: []
    # - http:
    #   url: graylog content pack path
    #   credentials:
    #     username:
    #       key: user
    #       name: secret-name
    #     password:
    #       key: password
    #       name: secret-name
    #   tlsConfig:
    #     insecureSkipVerify: false
    #     ca:
    #       key: cert-ca.pem
    #       name: secret-certificate-authority
    #     cert:
    #       key: cert.crt
    #       name: secret-certificate
    #     pkey:
    #       key: cert.key
    #       name: secret-certificate

  # -- Graylog plugin path.
  # @default -- ""
  # customPluginsPaths:

  # -- Size of internal ring buffers. Raise this if raising outputbuffer_processors does not help anymore.
  # For optimum performance your LogMessage objects in the ring buffer should fit in your CPU L3 cache. Must be a power of 2. (512, 1024, 2048, ...)
  # ringSize: 262144

  # -- Size of internal ring buffers. Raise this if raising outputbuffer_processors does not help anymore.
  # inputbufferRingSize: 131072

  # -- The number of processors.
  # inputbufferProcessors: 3

  # -- The number of processors.
  # processbufferProcessors: 6

  # -- The number of processors.
  # outputbufferProcessors: 6

  # -- The maximum number of threads to allow in the pool
  # outputbufferProcessorThreadsMaxPoolSize: 33

  # -- Batch size for the Elasticsearch output. This is the maximum (!) number of messages the Elasticsearch output
  # module will get at once and write to Elasticsearch in a batch call. If the configured batch size has not been
  # reached within output_flush_interval seconds, everything that is available will be flushed at once. Remember
  # that every outputbuffer processor manages its own batch and performs its own batch write calls.
  # ("outputbuffer_processors" variable)
  # outputBatchSize: 1000

  # -- Maximum number of total connections to Elasticsearch.
  # elasticsearchMaxTotalConnections: 100

  # -- Maximum number of total connections per Elasticsearch route (normally this means per elasticsearch server).
  # elasticsearchMaxTotalConnectionsPerRoute: 100

  ##################################### Graylog S3 archive plugins configuration #######################################

  # -- A pathRepo for graylog-archiving-plugin
  pathRepo: "/usr/share/opensearch/snapshots/graylog/"

  # -- A flag for using S3-storage in the graylog-archiving-plugin
  s3Archive: false

  # -- An accessKey for using S3-storage in the graylog-archiving-plugin
  awsAccessKey: ""

  # -- A secretKey for using S3-storage in the graylog-archiving-plugin
  awsSecretKey: ""

  # -- Graylog user.
  user: admin

  # -- Graylog password.
  password: admin

  ############################################## Graylog TLS configuration #############################################

  # -- Configuration for TLS enabling for Graylog.
  tls:
    # -- Configuration for TLS for HTTP interface.
    # Certificate and private key for Graylog server and CA certificates in the Graylog keystore can be specified in
    # this section.
    http:
      # -- Allows enabling TLS for HTTP interface.
      # If this parameter is true, each connection to and from the Graylog server except inputs will be secured by TLS,
      # including API calls of the server to itself.
      enabled: false

      # -- Contains a name of Secret with CA certificates for a custom CA store.
      # If present, all certificates from the Secret will be added to the Java keystore.
      # The keystore can be used for TLS in the custom inputs as well.
      #
      # cacerts: secret-ca

      # -- The X.509 certificate chain file in PEM format to use for securing the HTTP interface.
      # If present, both secretKey and secretName fields are required. This certificate will be added to the Java keystore.
      # cert:
      #   secretName: secret-cert
      #   secretKey: certificate.crt

      # -- The PKCS#8 private key file in PEM format to use for securing the HTTP interface.
      # If present, both secretKey and secretName fields are required.
      # key:
      #   secretName: secret-key
      #   secretKey: privateKey.key

      # -- The password to unlock the private key used for securing the HTTP interface.
      # keyFilePassword:

      # -- Configuration for generating certificates for TLS for HTTP interface.
      generateCerts: {}
        # -- Allows enabling certificate generation for TLS for HTTP interface.
        # enabled: false

        # -- Name of Secret with certificates for TLS for HTTP interface.
        # secretName: graylog-http-cert-manager-tls

        # -- Name of ClusterIssuer for certificate generation.
        # clusterIssuerName: ""

        # -- Duration of the certificate in days.
        # duration: 365

        # -- Renew before period in days.
        # renewBefore: 15

    # -- Configuration for TLS for out-of-box GELF input.
    input:
      # -- Allows enabling TLS for out-of-box GELF input managed by the operator.
      enabled: false

      # -- The X.509 certificate chain file in PEM format to use for securing Graylog input.
      # If present, both secretKey and secretName fields are required.
      # cert:
      #   secretName: secret-cert
      #   secretKey: certificate.crt

      # -- The PKCS#8 private key file in PEM format to use for securing Graylog input.
      # If present, both secretKey and secretName fields are required.
      # key:
      #   secretName: secret-key
      #   secretKey: privateKey.key

      # -- The password to unlock the private key used for securing Graylog input.
      # keyFilePassword:

      # -- Configuration for generating certificates for TLS for out-of-box GELF input.
      generateCerts: {}
        # -- Allows enabling certificate generation for TLS for HTTP interface.
        # enabled: false

        # -- Name of Secret with certificates for TLS for HTTP interface.
        # secretName: graylog-http-cert-manager-tls

        # -- Name of ClusterIssuer for certificate generation.
        # clusterIssuerName: ""

        # -- Duration of the certificate in days.
        # duration: 365

        # -- Renew before period in days.
        # renewBefore: 15

  # -- Settings for graylog-auth-proxy
  authProxy:
    # -- Allows enabling graylog-auth-proxy installation.
    install: false

    # -- Logging level.
    # Allowed values: DEBUG, INFO, WARNING, ERROR, CRITICAL
    logLevel: INFO

    # -- The resources describe to compute resource requests and limits for graylog-auth-proxy container.
    # Ref: https://kubernetes.io/docs/user-guide/compute-resources/
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 512Mi

    # -- A docker image for graylog-auth-proxy.
    # image: ghcr.io/netcracker/graylog-auth-proxy:main

    # -- A global timeout parameter affects requests to LDAP server, OAuth server and Graylog server.
    requestsTimeout: 30

    # -- Defines which type of authentication protocol will be chosen (LDAP or OAuth 2.0). Allowed values: ldap, oauth
    authType: "ldap"

    # -- Configuration for LDAP or AD connection
    ldap:
      # -- LDAP host to query.
      url: "ldap://localhost:389"

      # -- Establish a STAR TLS protected session.
      startTls: false

      # -- Establish an LDAP session over SSL.
      overSsl: false

      # -- Allow skipping verification of the LDAP server's certificate.
      skipVerify: false

      # -- Configuration for a Secret contains CA certificate for LDAP server.
      # If present, both secretKey and secretName fields are required.
      #
      # ca:
      #   secretName: secret-ca
      #   secretKey: ca.crt

      # -- Configuration for a client certificate. If present, both secretKey and secretName fields are required.
      # cert:
      #   secretName: secret-cert
      #   secretKey: certificate.crt

      # -- Configuration for a key for the certificate file. If present, both secretKey and secretName fields are required.
      # key:
      #   secretName: secret-key
      #   secretKey: privateKey.key

      # -- Sets ldap.OPT_REFERRALS to zero.
      disableReferrals: false

      # -- LDAP base DN.
      baseDN: ""

      # -- LDAP bind DN.
      bindDN: ""

      # -- LDAP password for the bind DN.
      # Will be stored in the secret with .ldap.bindPasswordSecret.name at key specified in the .ldap.bindPasswordSecret.key.
      bindPassword: ""

      # -- Allows to define a secret for bind password.
      # Ref: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.35/#secretkeyselector-v1-core
      bindPasswordSecret:
        name: graylog-auth-proxy-secret
        key: bindPassword

      # -- LDAP filter for binding users.
      searchFilter: "(cn=%(username)s)"

    # -- Configuration for OAuth 2.0 connection
    oauth:
      # -- OAuth2 authorization server host.
      host: ""

      # -- This path will be used to build URL for redirection to OAuth2 authorization server login page.
      authorizationPath: ""
      # -- This path will be used to build URL for getting access token from OAuth2 authorization server.
      tokenPath: ""
      # -- This path will be used to build URL for getting information about current user from OAuth2 authorization server
      # to get username and entities (roles, groups, etc.) for Graylog roles and streams mapping.
      userinfoPath: ""

      # -- URI to redirect after successful logging in on the OAuth2 authorization server side.
      # Uses "graylog.host" (the same host as in the Graylog Ingress) with /code path by default.
      # Please make sure that your OAuth server allows using this URI as a redirection URI.
      #
      # redirectUri:

      # -- OAuth2 Client ID for the proxy.
      clientID: ""
      # -- OAuth2 Client Secret for the proxy.
      # Will be stored in the secret with .oauth.clientCredentialsSecret.name at key specified in the .oauth.clientCredentialsSecret.key.
      clientSecret: ""

      # -- OAuth2 scopes for the proxy separated by spaces.
      # Configured for Keycloak server by default.
      scopes: "openid profile roles"

      # -- JSONPath (by jsonpath-ng) for taking username from the JSON returned from OAuth2 server by using userinfo path.
      # Configured for Keycloak server by default.
      userJsonpath: "preferred_username"

      # -- JSONPath (by jsonpath-ng) for taking information about entities (roles, groups, etc.)
      # for Graylog roles and streams mapping from the JSON returned from OAuth2 server by using userinfo path.
      # Configured for Keycloak server by default.
      rolesJsonpath: "realm_access.roles[*]"

      # -- Allow skipping verification of the OAuth2 authorization server's certificate.
      skipVerify: false

      # -- Configuration for a Secret contains CA certificate for OAuth2 server.
      # If present, both secretKey and secretName fields are required.
      #
      # ca:
      #   secretName: secret-ca
      #   secretKey: ca.crt

      # -- Configuration for a client certificate. If present, both secretKey and secretName fields are required.
      # cert:
      #   secretName: secret-cert
      #   secretKey: certificate.crt

      # -- Configuration for a key for the certificate file. If present, both secretKey and secretName fields are required.
      # key:
      #   secretName: secret-key
      #   secretKey: privateKey.key

      # -- Allows to define a Kubernetes Secret for OAuth client secret.
      clientCredentialsSecret:
        name: graylog-auth-proxy-secret
        key: clientSecret

    # -- Comma separated pre-created users in Graylog for which you do not need to rotate passwords.
    preCreatedUsers: admin,auditViewer,operator,telegraf_operator,graylog-sidecar,graylog_api_th_user

    # -- Interval in days between password rotation for non-pre-created users.
    rotationPassInterval: 3

    # -- Filter for mapping Graylog roles between LDAP or OAuth and Graylog users.
    # Example: '"CN=otrk_admins,OU=OTRK_Groups,OU=IRQA_LDAP,DC=testad,DC=local":["Admin"] | "CN=otrk_users,OU=OTRK_Groups,OU=IRQA_LDAP,DC=testad,DC=local":["Reader","Operator"] | ["Reader"]'
    roleMapping: '[]'

    # -- Filter for sharing Graylog streams between LDAP or OAuth and Graylog users.
    # Example: '"CN=otrk_admins,OU=OTRK_Groups,OU=IRQA_LDAP,DC=testad,DC=local":["Default Stream/manage","all events/view"] | "CN=otrk_users,OU=OTRK_Groups,OU=IRQA_LDAP,DC=testad,DC=local":["All events"] | ["System logs/view"]'
    streamMapping: ''

# -- Mandatory values for FluentD.
# @default -- {}
fluentd:
  # -- Allow disabling create FluentD during deploy
  install: true

  # -- A docker image to use for fluent daemon set.
  # renovate: datasource=github-releases depName=Netcracker/qubership-fluentd versioning=loose
  # dockerImage: ghcr.io/netcracker/qubership-fluentd:1.19.2-1

  # -- If specified, the pod's scheduling constraints. Ref: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.35/#affinity-v1-core
  affinity: {}

  # -- List of tolerations applied to FluentD Pods.
  tolerations:
  - key: node-role.kubernetes.io/master
    operator: Exists
  - operator: "Exists"
    effect: "NoExecute"
  - operator: "Exists"
    effect: "NoSchedule"

  # -- Allow defines which Nodes the Pods are scheduled on. nodeSelectorKey - key name
  # nodeSelectorKey: region

  # -- Allow defines which Nodes the Pods are scheduled on. nodeSelectorValue - value
  # nodeSelectorValue: primary

  # -- The resources describe to compute resource requests and limits for single Pods. Ref: https://kubernetes.io/docs/user-guide/compute-resources/
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # -- Allows specifying securityContext.privileged for FluentD container.
  securityContextPrivileged: false

  # -- Volumes specified will be appended to other volumes that are generated as a result of StorageSpec objects.
  # Ref: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.35/#volume-v1-core
  # @default -- not set
  additionalVolumes: {}

  # -- VolumeMounts specified will be appended to other VolumeMounts in the prometheus container,
  # that are generated as a result of StorageSpec objects.
  # Ref: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.35/#volumemount-v1-core
  # @default -- not set
  additionalVolumeMounts: {}

  # -- Allow creating security resources as PodSecurityPolicy, SecurityContextConstraints
  securityResources:
    install: false
    name: logging-fluentd

  # -- PriorityClassName assigned to the Pods to prevent them from evicting.
  # priorityClassName: "priorityClassName"

  # -- Flag for using file storage instead of memory
  fileStorage: false

  # -- If "gzip" is set, FluentD compresses data records before writing to buffer chunks
  # @default -- text
  # compress: text

  # -- (Deprecated) Max length of buffers queue
  # queueLimitLength:

  # -- The size limitation of output buffer
  totalLimitSize: 512MB

  # -- Adds additional custom fields/labels to every log message by using filter based on record_transformer plugin.
  # extraFields:
  #   foo_key: foo_value
  #   bar_key: bar_value

  # -- FluentD custom input configuration.
  customInputConf: ""

  # -- FluentD custom filter configuration.
  customFilterConf: ""

  # -- FluentD custom output configuration.
  customOutputConf: ""

  # -- The regexp for filter-concat
  # @default -- /(^\[\d{4}\-\d{2}\-\d{2})|(^\{\")|(^*0m\d{2}\:\d{2}\:\d{2})/
  # multilineFirstLineRegexp:

  # -- Path to exclude logs, it can have multiple values as an array.
  # @default -- []
  # excludePath:
    # - "/var/log/pods/openshift-dns_dns-default*/dns/*.log"

  # -- Enable input for system logs from /var/log/messages, /var/log/syslog or /var/log/journal.
  # Type of system logs can be chosen by systemLogType parameter.
  systemLogging: true

  # -- Type of system log, e.g. varlogmessages, varlogsyslog and systemd
  # @default -- varlogmessages
  # systemLogType: varlogmessages

  # -- Enable input for system audit logs from /var/log/audit/audit.log.
  systemAuditLogging: true

  # -- Enable input for Kubernetes audit logs
  # from /var/log/kubernetes/kube-apiserver-audit.log and /var/log/kubernetes/audit.log.
  kubeAuditLogging: true

  # -- Enable input for Kubernetes APIServer audit logs
  # from /var/log/kube-apiserver/audit.log for Kubernetes and /var/log/openshift-apiserver/audit.log for OpenShift.
  kubeApiserverAuditLogging: true

  # -- Enable input for container logs from /var/logs/containers for Docker or /var/log/pods for other engines.
  containerLogging: true

  # -- Set up a watch on pods on the API server for updates to metadata.
  # @default -- true
  # watchKubernetesMetadata: true

  # -- FluentD filter for parsing bill-cycle-logs
  # @default -- false
  # billCycleConf: false

  # -- Allow to add filter to parse json of Kubernetes events logs from Cloud Events Reader
  cloudEventsReaderFormat: json

  # -- Pod monitor for FluentD
  podMonitor:
    # -- Allow change metrics scrape timeout
    scrapeTimeout: 10s
    # -- Allow change metrics scrape interval
    scrapeInterval: 30s

  configmapReload:
    # -- A docker image for configmap-reload.
    # dockerImage: ghcr.io/jimmidyson/configmap-reload:v0.13.1

    # The resources describe to compute resource requests and limits for single Pods. Ref: https://kubernetes.io/docs/user-guide/compute-resources/
    resources:
      limits:
        cpu: 50m
        memory: 50Mi
      requests:
        cpu: 10m
        memory: 10Mi

  ########################################### Graylog output configuration #############################################

  # -- Flag for enabling Graylog output.
  # @default -- true
  # graylogOutput: true

  # -- Graylog host. Example: 10.10.10.10 or graylog-service.graylog.svc
  # graylogHost:

  # -- Graylog port, for example: 12201
  # default -- 12201
  # graylogPort:

  # -- Graylog protocol: tcp/udp
  graylogProtocol: tcp

  # -- Graylog buffer flush interval
  # @default -- 5s
  # graylogBufferFlushInterval: 5s

  # -- FluentD configuration for TLS enabling for Graylog output. Works only for TCP Graylog protocol.
  tls:
    # -- Allows enabling TLS for out-of-box Graylog GELF output managed by the operator.
    enabled: false

    # -- Prevents OpenSSL from using the systems CA store.
    noDefaultCA: false

    # -- Any of :TLSv1, :TLSv1_1, :TLSv1_2.
    version: ":TLSv1_2"

    # -- Configuration for a custom CA store. If present, both secretKey and secretName fields are required.
    # ca:
    #   secretName: secret-tls-cert
    #   secretKey: ca.crt

    # -- Configuration for a client certificate. If present, both secretKey and secretName fields are required.
    # cert:
    #   secretName: secret-tls-cert
    #   secretKey: certificate.crt

    # -- Configuration for a key for the certificate file. If present, both secretKey and secretName fields are required.
    # key:
    #   secretName: secret-tls-cert
    #   secretKey: privateKey.key

    # -- Allows any ciphers to be used, may be insecure.
    allCiphers: true

    # -- Similar to rescue_network_errors in notifier.rb, allows SSL exceptions to be raised.
    rescueSslErrors: false

    # -- Disable peer verification.
    noVerify: false

    # -- Configuration for generating certificates.
    generateCerts: {}
      # -- Allows enabling certificate generation for TLS for HTTP interface.
      # enabled: false

      # -- Name of Secret with certificates for TLS for HTTP interface.
      # secretName: graylog-http-cert-manager-tls

      # -- Name of ClusterIssuer for certificate generation.
      # clusterIssuerName: ""

      # -- Duration of the certificate in days.
      # duration: 365

      # -- Renew before period in days.
      # renewBefore: 15

  ############################################### Outputs configuration ################################################

  # -- Output configuration.
  output:
    # -- Loki output configuration.
    loki:
      # -- Flag for enabling Loki output.
      enabled: false

      # -- Loki host. Example: http://10.10.10.10:3100 or http://loki-write.loki.svc:3100
      # host: http://loki-write.loki.svc:3100

      # -- Loki tenant id.
      # tenant:

      # -- Authentication for Loki.
      # Inline credentials can be specified via `credentials` (chart creates the Secret automatically).
      # Alternatively, reference pre-created secrets via `token`, `user`, `password`.
      # If both are specified, secret references take priority.
      auth: {}
        # credentials:
        #   username: ""
        #   password: ""
        #   token: ""
        #   secretName: ""
        # token:
        #   name: loki-secret
        #   key: token
        # user:
        #   name: loki-secret
        #   key: user
        # password:
        #   name: loki-secret
        #   key: password

      # -- Static labels that added as stream labels. Should be valid JSON string with key-value pairs, for example: '{"job":"fluentd","env":"production"}'.
      staticLabels: '{"job":"fluentd"}'

      # -- Labels mappings that defines how to extract labels from each log record
      labelsMapping: |-
        stream $.stream
        container $.container
        pod $.pod
        namespace $.namespace
        level $.level
        hostname $.hostname
        nodename $.kubernetes_host
        request_id $.request_id
        tenant_id $.tenant_id
        addressTo $.addressTo
        originating_bi_id $.originating_bi_id
        spanId $.spanId

      # -- Additional configuration parameters for Loki output.
      # Buffer can be configured here and other available parameters of FluentD Loki output plugin.
      # See all the parameters here: https://github.com/grafana/loki/blob/main/clients/cmd/fluentd/lib/fluent/plugin/out_loki.rb
      # extraParams: |
      #   extract_kubernetes_labels false
      #   remove_keys []
      #   custom_headers header:value

      # -- TLS configuration for Loki output.
      tls:
        # -- Allows enabling TLS for Loki output.
        enabled: false

        # -- Configuration for a custom CA store. If present, both secretKey and secretName fields are required.
        # ca:
        #   secretName: secret-tls-cert
        #   secretKey: ca.crt

        # -- Configuration for a client certificate. If present, both secretKey and secretName fields are required.
        # cert:
        #   secretName: secret-tls-cert
        #   secretKey: certificate.crt

        # -- Configuration for a key for the certificate file. If present, both secretKey and secretName fields are required.
        # key:
        #   secretName: secret-tls-cert
        #   secretKey: privateKey.key

        # -- Allows any ciphers to be used, may be insecure.
        allCiphers: true

        # -- Any of :TLSv1, :TLSv1_1, :TLSv1_2.
        # @default -- no value
        #
        # version: ":TLSv1_2"

        # -- Force certificate validation.
        noVerify: false

    # -- Flag for enabling HTTP output.
    http:
      # -- Flag for enabling Http output.
      enabled: false

      routing:
        # -- Enables stream field propagation to http header which is used to route logs to different storage backends.
        enabled: false

        # -- Header used to propagate logs stream and further routing to different storage backends.
        # @default -- X-Log-Type
        # logCategoryHeader: X-Log-Type

      # -- Http host. nExample: http://10.10.10.10:9428 or https://vlsingle-k8s.victorialogs:9428
      host: ""

      # -- Http path for url to ingest logs.
      # @default -- /insert/jsonline
      # path: /insert/jsonline

      # -- Authentication for HTTP output.
      # Inline credentials can be specified via `credentials` (chart creates the Secret automatically).
      # Alternatively, reference pre-created secrets via `token`, `user`, `password`.
      # If both are specified, secret references take priority.
      auth: {}
        # credentials:
        #   username: ""
        #   password: ""
        #   token: ""
        #   secretName: ""
        # token:
        #   name: vl-write-token
        #   key: token
        # user:
        #   name: vl-write-credentials
        #   key: username
        # password:
        #   name: vl-write-credentials
        #   key: password

      # -- Payload compression mechanism for Http output. Allowed values: text/gzip.
      compress: gzip

      # -- Additional headers for HTTP request.
      # @default -- {"VL-Msg-Field": "log", "VL-Time-Field": "time", "VL-Stream-Fields": "stream"}
      # headers: {"VL-Msg-Field": "log", "VL-Time-Field": "time", "VL-Stream-Fields": "stream"}

      # -- Additional configuration parameters for Http output.
      # Buffer can be configured here and other available parameters of FluentD Http output plugin.
      # See all the parameters here: https://docs.fluentd.org/output/http
      # extraParams: |
      #   extract_kubernetes_labels false
      #   remove_keys []
      #   custom_headers header:value

      # -- TLS configuration for Http output.
      tls:
        # -- Allows enabling TLS for Http output.
        enabled: false

        # -- Configuration for a custom CA store. If present, both secretKey and secretName fields are required.
        # ca:
        #   secretName: secret-tls-cert
        #   secretKey: ca.crt

        # -- Configuration for a client certificate. If present, both secretKey and secretName fields are required.
        # cert:
        #   secretName: secret-tls-cert
        #   secretKey: certificate.crt

        # -- Configuration for a key for the certificate file. If present, both secretKey and secretName fields are required.
        # key:
        #   secretName: secret-tls-cert
        #   secretKey: privateKey.key

        # -- Allows any ciphers to be used, may be insecure.
        # @default -- no value
        # ciphers: ""

        # -- The default version of TLS. Available values:TLSv1_3(since 1.19.0)/TLSv1_2/TLSv1_1
        # @default -- no value
        # version: ":TLSv1_2"

        # -- Force certificate validation. Available values: none/peer
        # @default -- "peer"
        # verifyMode: "peer"

# -- Mandatory values for FluentBit.
# @default -- {}
fluentbit:
  # -- Allow disabling create FluentBit during deploy
  install: false

  # -- A docker image to use for FluentBit daemon set.
  # dockerImage: fluent/fluent-bit:3.0.6

  configmapReload:
    # -- A docker image to use for ConfigMap Reload daemon set.
    # dockerImage: ghcr.io/jimmidyson/configmap-reload:v0.13.1

    # The resources describe to compute resource requests and limits for single Pods.
    # Ref: https://kubernetes.io/docs/user-guide/compute-resources/
    resources:
      limits:
        cpu: 50m
        memory: 50Mi
      requests:
        cpu: 10m
        memory: 10Mi

  # -- If specified, the pod's scheduling constraints
  # Ref: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.35/#affinity-v1-core
  affinity: {}

  # -- List of tolerations applied to FluentBit Pods.
  tolerations:
  - key: node-role.kubernetes.io/master
    operator: Exists
  - operator: "Exists"
    effect: "NoExecute"
  - operator: "Exists"
    effect: "NoSchedule"

  # -- Allow defines which Nodes the Pods are scheduled on. nodeSelectorKey - key name
  # nodeSelectorKey: region

  # -- Allow defines which Nodes the Pods are scheduled on. nodeSelectorValue - value
  # nodeSelectorValue: primary

  # -- The resources describe to compute resource requests and limits for single Pods.
  # Ref: https://kubernetes.io/docs/user-guide/compute-resources/
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 512Mi

  # -- Allow to exclude some logs of pods/containers
  excludePath: ""

  # -- Volumes specified will be appended to other volumes that are generated as a result of StorageSpec objects.
  # Ref: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.35/#volume-v1-core
  # @default -- not set
  additionalVolumes: []

  # -- VolumeMounts specified will be appended to other VolumeMounts in the prometheus container,
  # that are generated as a result of StorageSpec objects.
  # Ref: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.35/#volumemount-v1-core
  # @default -- not set
  additionalVolumeMounts: []

  # -- The size limitation of output buffer
  totalLimitSize: 1024M

  # -- The size limitation of backlog data
  # See storage.backlog.mem_limit in https://docs.fluentbit.io/manual/administration/buffering-and-storage#service-section-configuration
  memBufLimit: 5M

  # -- Adds additional custom fields/labels to every log message by using filter based on record_modifier plugin.
  # This filter works after all other filters except the custom filter.
  # extraFields:
  #   foo_key: foo_value
  #   bar_key: bar_value

  # -- FluentBit custom input configuration.
  customInputConf: ""
  # [INPUT]
  #   Name   <name>

  # -- FluentBit custom filter configuration.
  customFilterConf: ""
  # [FILTER]
  #   Name record_modifier
  #   Match *
  #   Record testField fluent-bit

  # -- FluentBit custom output configuration.
  customOutputConf: ""
  # [OUTPUT]
  #   Name null
  #   Match fluent.*

  # -- FluentBit custom lua script configuration.
  customLuaScriptConf: {}
  # "scriptname.lua": |-
  #    <script_content>

  # -- FluentBit filter for parsing bill-cycle-logs
  # @default -- false
  #
  # billCycleConf: false

  # -- The regexp for the first line of multiline filter
  multilineFirstLineRegexp: ~

  # -- The regexp for the other lines of multiline filter
  multilineOtherLinesRegexp: ~

  # -- Enable input for system logs from /var/log/messages, /var/log/syslog or /var/log/journal.
  # Type of system logs can be chosen by systemLogType parameter.
  systemLogging: true

  # -- Type of system log, e.g. varlogmessages, varlogsyslog and systemd
  # systemLogType: varlogmessages

  # -- Enable input for system audit logs from /var/log/audit/audit.log.
  systemAuditLogging: true

  # -- Enable input for Kubernetes audit logs from /var/log/kubernetes/kube-apiserver-audit.log and /var/log/kubernetes/audit.log.
  kubeAuditLogging: true

  # -- Enable input for Kubernetes APIServer audit logs
  # from /var/log/kube-apiserver/audit.log for Kubernetes and /var/log/openshift-apiserver/audit.log for OpenShift.
  kubeApiserverAuditLogging: true

  # -- Enable input for container logs from /var/logs/containers for Docker or /var/log/pods for other engines.
  containerLogging: true

  # -- Set up a watch on pods on the API server for updates to metadata.
  # @default -- true
  # watchKubernetesMetadata: true

  # -- Allows specifying securityContext.privileged for FluentBit container.
  securityContextPrivileged: false

  # -- PriorityClassName assigned to the Pods to prevent them from evicting.
  # priorityClassName: "priorityClassName"

  # -- Allow creating security resources as PodSecurityPolicy, SecurityContextConstraints
  securityResources:
    name: logging-fluentbit
    install: false

  # -- Pod monitor for FluentBit
  podMonitor:
    # -- Allow change metrics scrape timeout
    scrapeTimeout: 10s
    # -- Allow change metrics scrape interval
    scrapeInterval: 30s

  # -- Prometheus alerting rules configuration.This section contains parameters for customizing alert
  # thresholds and delays for Prometheus rules related to Fluent Bit metrics.
  prometheusRules:

    # -- Alert delay to decrease false positive cases
    alertDelay: 3m

    # -- The threshold value for the rate of dropped records that triggers the alert.
    dropRecordsRateThreshold: 10

    # -- The threshold value for the rate of parse errors that triggers the alert.
    parseErrorRateThreshold: 20

  ############################################ Graylog output configuration ############################################

  # -- Flag for enabling Graylog output.
  # @default -- true
  graylogOutput: true

  # -- Graylog host. Example: 10.10.10.10 or graylog-service.graylog.svc
  # graylogHost:

  # -- Graylog port, for example: 12201
  # graylogPort:

  # -- Graylog protocol: tcp/udp/etc
  graylogProtocol: tcp

  # -- Fluent-bit configuration for TLS enabling for Graylog output. Works only for TCP Graylog protocol.
  tls:
    # -- Allows enabling TLS for out-of-box Graylog GELF output managed by the operator.
    enabled: false

    # -- Configuration for a custom CA store. If present, both secretKey and secretName fields are required.
    # ca:
    #   secretName: secret-tls-cert
    #   secretKey: ca.crt

    # -- Configuration for a client certificate. If present, both secretKey and secretName fields are required.
    # cert:
    #   secretName: secret-tls-cert
    #   secretKey: certificate.crt

    # -- Configuration for a key for the certificate file. If present, both secretKey and secretName fields are required.
    # key:
    #   secretName: secret-tls-cert
    #   secretKey: privateKey.key

    # -- Force certificate validation.
    # @default -- true
    #
    # verify: true

    # -- Optional password for private key file.
    #
    # keyPasswd: secret

    # -- Configuration for generating certificates.
    generateCerts: {}
      # -- Allows enabling certificate generation for TLS for HTTP interface.
      # enabled: false

      # -- Name of Secret with certificates for TLS for HTTP interface.
      # secretName: graylog-http-cert-manager-tls

      # -- Name of ClusterIssuer for certificate generation.
      # clusterIssuerName: ""

      # -- Duration of the certificate in days.
      # duration: 365

      # -- Renew before period in days.
      # renewBefore: 15

  ############################################### Outputs configuration ################################################

  # -- Output configuration.
  output:
    # -- Loki output configuration.
    loki:
      # -- Flag for enabling Loki output.
      enabled: false

      # -- Loki host. Example: 10.10.10.10 or loki-write.loki.svc
      # host: loki-write.loki.svc

      # -- Loki tenant id. Example: fake
      # tenant:

      # -- Authentication for Loki.
      # Inline credentials can be specified via `credentials` (chart creates the Secret automatically).
      # Alternatively, reference pre-created secrets via `token`, `user`, `password`.
      # If both are specified, secret references take priority.
      auth: {}
        # credentials:
        #   username: ""
        #   password: ""
        #   token: ""
        #   secretName: ""
        # token:
        #   name: loki-secret
        #   key: token
        # user:
        #   name: loki-secret
        #   key: user
        # password:
        #   name: loki-secret
        #   key: password

      # -- Static labels that added as stream labels.
      staticLabels: job=fluentbit

      # -- Labels mappings that defines how to extract labels from each log record. Value should contain a JSON object.
      labelsMapping: |-
        {
            "container": "container",
            "pod": "pod",
            "namespace": "namespace",
            "stream": "stream",
            "level": "level",
            "hostname": "hostname",
            "nodename": "nodename",
            "request_id": "request_id",
            "tenant_id": "tenant_id",
            "addressTo": "addressTo",
            "originating_bi_id": "originating_bi_id",
            "spanId": "spanId"
        }

      # -- TLS configuration for Loki output.
      tls:
        # -- Allows enabling TLS for Loki output.
        enabled: false

        # -- Configuration for a custom CA store. If present, both secretKey and secretName fields are required.
        # ca:
        #   secretName: secret-tls-cert
        #   secretKey: ca.crt

        # -- Configuration for a client certificate. If present, both secretKey and secretName fields are required.
        # cert:
        #   secretName: secret-tls-cert
        #   secretKey: certificate.crt

        # -- Configuration for a key for the certificate file. If present, both secretKey and secretName fields are required.
        # key:
        #   secretName: secret-tls-cert
        #   secretKey: privateKey.key

        # -- Force certificate validation.
        verify: true

        # -- Optional password for private key file.
        # keyPasswd: secret

      # -- Additional configuration parameters for Loki output.
      # See docs: https://docs.fluentbit.io/manual/pipeline/outputs/loki#configuration-parameters
      extraParams: |
          workers                2
          Retry_Limit            32
          storage.total_limit_size  5000M
          net.connect_timeout 20

    # -- Flag for enabling HTTP output.
    http:
      # -- Flag for enabling Http output.
      enabled: false

      # -- Http host. Example: 10.10.10.10 or vlsingle-k8s.victorialogs
      host: ""

      # -- Http port, for example: 9428
      # port: 9428

      # -- Http uri to ingest logs.
      # @default -- '/insert/jsonline?_stream_fields=stream&_msg_field=short_message&_time_field=time'
      # uri: '/insert/jsonline?_stream_fields=stream&_msg_field=short_message&_time_field=time'

      # -- Payload compression mechanism for Http output. Allowed values: gzip, snappy, zstd.
      compress: gzip

      # -- Additional configuration parameters for Http output.
      # See docs: https://docs.fluentbit.io/manual/data-pipeline/outputs/http#configuration-parameters
      # extraParams: |

      # -- Authentication for Http.
      # Inline credentials can be specified via `credentials` (chart creates the Secret automatically).
      # Alternatively, reference pre-created secrets via `token`, `user`, `password`.
      # If both are specified, secret references take priority.
      auth: {}
        # credentials:
        #   username: ""
        #   password: ""
        #   token: ""
        #   secretName: ""
        # user:
        #   name: http-secret
        #   key: user
        # password:
        #   name: http-secret
        #   key: password
        # token:
        #   name: http-secret
        #   key: token

      # -- TLS configuration for Http output.
      tls:
        # -- Allows enabling TLS for Http output.
        enabled: false

        # -- Configuration for a custom CA store. If present, both secretKey and secretName fields are required.
        # ca:
        #   secretName: secret-tls-cert
        #   secretKey: ca.crt

        # -- Configuration for a client certificate. If present, both secretKey and secretName fields are required.
        # cert:
        #   secretName: secret-tls-cert
        #   secretKey: certificate.crt

        # -- Configuration for a key for the certificate file. If present, both secretKey and secretName fields are required.
        # key:
        #   secretName: secret-tls-cert
        #   secretKey: privateKey.key

        # -- Force certificate validation.
        # @default -- true
        # verify: true

        # -- Optional password for private key file.
        # keyPasswd: secret

      routing:
        # -- Enables streams routing filters for Http output.
        enabled: false

        # -- Header which is used by vmauth in routing rules to different vlsingle instances.
        # For example, if headerTag is set to X-Log-Type, FluentBit will add this header with value of record's tag for each log
        # and vmauth can route logs based on this header value.
        # headerTag: X-Log-Type

    # -- OpenTelemetry output configuration.
    otel:
      # -- Flag for enabling opentelemetry output.
      enabled: false

      # -- Otel host. Example: 10.10.10.10 or vlsingle-k8s.victorialogs
      host: ""

      # -- Otel port, for example: 9428
      # port: 9428

      # -- Otel output target. Set to "" if the logs should be sent to Otel collector or another opentelemetry API compatible storage.
      target: "victorialogs"

      # -- Otel uri to ingest logs.
      # @default -- '/insert/opentelemetry/v1/logs'
      # logsUri: '/insert/opentelemetry/v1/logs'

      # -- Payload compression mechanism for opentelemetry output. Allowed values: gzip, zstd.
      compress: gzip

      # -- Allows to set a time interval in seconds to suppress log messages from output plugin that appear similar within that interval.
      # @default -- 0 (disabled)
      # logSuppressInterval: 0

      # -- Additional configuration parameters for opentelemetry output.
      # See docs: https://docs.fluentbit.io/manual/data-pipeline/outputs/opentelemetry
      # extraParams: |

      # -- Authentication for Otel.
      # Inline credentials can be specified via `credentials` (chart creates the Secret automatically).
      # Alternatively, reference pre-created secrets via `token`, `user`, `password`.
      # If both are specified, secret references take priority.
      auth: {}
        # credentials:
        #   username: ""
        #   password: ""
        #   token: ""
        #   secretName: ""
        # user:
        #   name: otel-secret
        #   key: user
        # password:
        #   name: otel-secret
        #   key: password
        # token:
        #   name: otel-secret
        #   key: token

      # -- TLS configuration for otel output.
      tls:
        # -- Allows enabling TLS for Otel output.
        enabled: false

        # -- Configuration for a custom CA store. If present, both secretKey and secretName fields are required.
        # ca:
        #   secretName: secret-tls-cert
        #   secretKey: ca.crt

        # -- Configuration for a client certificate. If present, both secretKey and secretName fields are required.
        # cert:
        #   secretName: secret-tls-cert
        #   secretKey: certificate.crt

        # -- Configuration for a key for the certificate file. If present, both secretKey and secretName fields are required.
        # key:
        #   secretName: secret-tls-cert
        #   secretKey: privateKey.key

        # -- Force certificate validation.
        # @default -- true
        # verify: true

        # -- Optional password for private key file.
        # keyPasswd: secret

  aggregator:
    # -- Allow disabling create FluentBit aggregator deployment during deploy
    install: false

    # -- A docker image to use for FluentBit aggregator deployment.
    # dockerImage: fluent/fluent-bit:3.0.6

    configmapReload:
      # -- A docker image to use for FluentBit aggregator configmap reload sidecar.
      # dockerImage: ghcr.io/jimmidyson/configmap-reload:v0.13.1

      # -- The resources describe to compute resource requests and limits for single Pods.
      # Ref: https://kubernetes.io/docs/user-guide/compute-resources/
      resources:
        limits:
          cpu: 50m
          memory: 50Mi
        requests:
          cpu: 10m
          memory: 10Mi

    # -- A number of replicas for FluentBit aggregator deployment.
    replicas: 2

    # -- If specified, the pod's scheduling constraints. Ref: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.35/#affinity-v1-core
    affinity: {}

    # -- List of tolerations applied to FluentBit aggregator Pods.
    tolerations: []

    # -- Allow defines which Nodes the Pods are scheduled on. nodeSelectorKey - key name
    # nodeSelectorKey: region

    # -- Allow defines which Nodes the Pods are scheduled on. nodeSelectorValue - value
    # nodeSelectorValue: primary

    # -- PriorityClassName assigned to the Pods to prevent them from evicting.
    # priorityClassName: "priorityClassName"

    # -- Allow creating security resources as PodSecurityPolicy, SecurityContextConstraints
    securityResources:
      install: false
      name: logging-fluentbit-aggregator

    # -- The amount of time the operator waits for Aggregator pod(s) to start, in minutes
    startupTimeout: 8

    # -- Allows installing PVCs for Aggregator pods. By default storage of aggregator has emptyDir type
    volume: {}
      # Flag to installing PVC for Aggregator logs
      # @default -- false
      # bind: false

      # -- Aggregator PVC storage class name.
      # @default -- ""
      # storageClassName: ""

      # -- Storage size limit of PVC, e.g. '400Mi'
      # @default -- 2Gi
      # storageSize: 2Gi

    # -- The resources describe to compute resource requests and limits for single Pods.
    # Ref: https://kubernetes.io/docs/user-guide/compute-resources/
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 2
        memory: 2Gi

    # -- The size limitation of output buffer
    totalLimitSize: 1024M

    # -- The size limitation of backlog data
    # See storage.backlog.mem_limit in https://docs.fluentbit.io/manual/administration/buffering-and-storage#service-section-configuration
    memBufLimit: 5M

    # -- Adds additional custom fields/labels to every log message by using filter based on record_modifier plugin.
    # This filter works after all other filters except the custom filter.
    #
    # extraFields:
    #   foo_key: foo_value
    #   bar_key: bar_value

    # -- FluentBit custom input configuration.
    customInputConf: ""
    # [INPUT]
    #   Name   <name>

    # -- FluentBit custom filter configuration.
    customFilterConf: ""
    # [FILTER]
    #   Name record_modifier
    #   Match *
    #   Record testField fluent-bit

    # -- FluentBit custom output configuration.
    customOutputConf: ""
    # [OUTPUT]
    #   Name null
    #   Match fluent.*

    # -- FluentBit custom lua script configuration.
    customLuaScriptConf: {}
    # "scriptname.lua": |-
    #    <script_content>

    # -- The regexp for the first line of multiline filter
    multilineFirstLineRegexp: ~

    # -- The regexp for the other lines of multiline filter
    multilineOtherLinesRegexp: ~

    ########################################### Graylog output configuration ###########################################

    # -- Flag for enabling Graylog output.
    # @default -- true
    graylogOutput: true

    # -- Graylog host. Example: 10.10.10.10 or graylog-service.graylog.svc
    # graylogHost:

    # -- Graylog port, for example: 12201
    # graylogPort:

    # -- Graylog protocol: tcp/udp/etc
    graylogProtocol: tcp

    # -- Fluent-bit configuration for TLS enabling for Graylog output. Works only for TCP Graylog protocol.
    tls:
      # -- Allows enabling TLS for out-of-box Graylog GELF output managed by the operator.
      enabled: false

      # -- Renew before period in days.
      # renewBefore: 15

      # -- Configuration for a custom CA store. If present, both secretKey and secretName fields are required.
      # ca:
      #   secretName: secret-tls-cert
      #   secretKey: ca.crt

      # -- Configuration for a client certificate. If present, both secretKey and secretName fields are required.
      # cert:
      #   secretName: secret-tls-cert
      #   secretKey: certificate.crt

      # -- Configuration for a key for the certificate file. If present, both secretKey and secretName fields are required.
      # key:
      #   secretName: secret-tls-cert
      #   secretKey: privateKey.key

      # -- Force certificate validation.
      # verify: true

      # -- Password for private key file.
      # keyPasswd: secret

            # -- Configuration for generating certificates.
      generateCerts: {}
        # -- Allows enabling certificate generation for TLS for HTTP interface.
        # enabled: false

        # -- Name of Secret with certificates for TLS for HTTP interface.
        # secretName: graylog-http-cert-manager-tls

        # -- Name of ClusterIssuer for certificate generation.
        # clusterIssuerName: ""

        # -- Duration of the certificate in days.
        # duration: 365

    ######################################### All other outputs configuration ##########################################

    # -- Output configuration.
    output:

      # -- Loki output configuration.
      loki:
        # -- Flag for enabling Loki output.
        enabled: false

        # -- Loki host. Example: 10.10.10.10 or loki-write.loki.svc
        # host: loki-write.loki.svc

        # -- Authentication for Loki.
        # Inline credentials can be specified via `credentials` (chart creates the Secret automatically).
        # Alternatively, reference pre-created secrets via `token`, `user`, `password`.
        # If both are specified, secret references take priority.
        auth: {}
          # credentials:
          #   username: ""
          #   password: ""
          #   token: ""
          #   secretName: ""
          # token:
          #   name: loki-secret
          #   key: token
          # user:
          #   name: loki-secret
          #   key: user
          # password:
          #   name: loki-secret
          #   key: password

        # -- Static labels that added as stream labels.
        staticLabels: job=fluentbit

        # -- Labels mappings that defines how to extract labels from each log record. Value should contain a JSON object.
        labelsMapping: |-
          {
              "container": "container",
              "pod": "pod",
              "namespace": "namespace",
              "stream": "stream",
              "level": "level",
              "hostname": "hostname",
              "nodename": "nodename",
              "request_id": "request_id",
              "tenant_id": "tenant_id",
              "addressTo": "addressTo",
              "originating_bi_id": "originating_bi_id",
              "spanId": "spanId"
          }

        # -- Additional configuration parameters for Loki output.
        # See docs: https://docs.fluentbit.io/manual/pipeline/outputs/loki#configuration-parameters
        extraParams: |
            workers                2
            Retry_Limit            32
            storage.total_limit_size  5000M
            net.connect_timeout 20

        # -- TLS configuration for Loki output.
        tls:
          # -- Allows enabling TLS for Loki output.
          enabled: false

          # -- Configuration for a custom CA store. If present, both secretKey and secretName fields are required.
          # ca:
          #   secretName: secret-tls-cert
          #   secretKey: ca.crt

          # -- Configuration for a client certificate. If present, both secretKey and secretName fields are required.
          # cert:
          #   secretName: secret-tls-cert
          #   secretKey: certificate.crt

          # -- Configuration for a key for the certificate file. If present, both secretKey and secretName fields are required.
          # key:
          #   secretName: secret-tls-cert
          #   secretKey: privateKey.key

          # -- Force certificate validation.
          # verify: true

          # -- Password for private key file.
          # keyPasswd: secret

      # -- Http output configuration.
      http:
        # -- Flag for enabling Http output.
        enabled: false

        # -- Http host. Example: 10.10.10.10 or vlsingle-k8s.victorialogs
        # host: vlsingle-k8s.victorialogs

        # -- Http port
        # port: 9428

        # -- Uri for Http output.
        # @default -- '/insert/jsonline?_stream_fields=stream&_msg_field=short_message&_time_field=time'
        # uri: '/insert/jsonline?_stream_fields=stream&_msg_field=short_message&_time_field=time'

        # -- Payload compression mechanism for Http output. Allowed values: gzip, snappy, zstd.
        # compress: gzip

        # -- Authentication for Http.
        # Inline credentials can be specified via `credentials` (chart creates the Secret automatically).
        # Alternatively, reference pre-created secrets via `token`, `user`, `password`.
        # If both are specified, secret references take priority.
        auth: {}
          # credentials:
          #   username: ""
          #   password: ""
          #   token: ""
          #   secretName: ""
          # user:
          #   name: http-secret
          #   key: user
          # password:
          #   name: http-secret
          #   key: password
          # token:
          #   name: http-secret
          #   key: token

        # -- Additional configuration parameters for Http output. Bearer token can be set here as well.
        # See docs: https://docs.fluentbit.io/manual/data-pipeline/outputs/http#configuration-parameters
        #
        # extraParams: |

        # -- TLS configuration for Http output.
        tls:
          # -- Allows enabling TLS for Http output.
          enabled: false

          # -- Configuration for a custom CA store. If present, both secretKey and secretName fields are required.
          # ca:
          #   secretName: secret-tls-cert
          #   secretKey: ca.crt

          # -- Configuration for a client certificate. If present, both secretKey and secretName fields are required.
          # cert:
          #   secretName: secret-tls-cert
          #   secretKey: certificate.crt

          # -- Configuration for a key for the certificate file. If present, both secretKey and secretName fields are required.
          # key:
          #   secretName: secret-tls-cert
          #   secretKey: privateKey.key

          # -- Force certificate validation.
          verify: true

          # -- Optional password for private key file.
          # keyPasswd: secret

        routing:

          # -- Enables streams routing filters for Http output.
          enabled: false

          # -- Header which is used by vmauth in routing rules to different vlsingle instances.
          # For example, if headerTag is set to X-Log-Type, FluentBit will add this header with value of record's tag for each log
          # and vmauth can route logs based on this header value.
          # headerTag: X-Log-Type

      # -- Otel output configuration.
      otel:
        # -- Flag for enabling opentelemetry output.
        enabled: false

        # -- Otel host. Example: 10.10.10.10 or vlsingle-k8s.victorialogs
        host: ""

        # -- Otel output target. Set to "" if the logs should be sent to Otel collector or another opentelemetry API compatible storage.
        target: "victorialogs"

        # -- Otel port, for example: 9428
        # port: 9428

        # -- Otel uri to ingest logs.
        # @default -- '/insert/opentelemetry/v1/logs'
        # logsUri: '/insert/opentelemetry/v1/logs'

        # -- Payload compression mechanism for opentelemetry output. Allowed values: gzip, zstd.
        compress: gzip

        # -- Allows to set a time interval in seconds to suppress log messages from output plugin that appear similar within that interval.
        # @default -- 0 (disabled)
        # logSuppressInterval: 0

        # -- Additional configuration parameters for opentelemetry output.
        # See docs: https://docs.fluentbit.io/manual/data-pipeline/outputs/opentelemetry
        # extraParams: |

        # -- Authentication for Otel.
        # Inline credentials can be specified via `credentials` (chart creates the Secret automatically).
        # Alternatively, reference pre-created secrets via `token`, `user`, `password`.
        # If both are specified, secret references take priority.
        auth: {}
          # credentials:
          #   username: ""
          #   password: ""
          #   token: ""
          #   secretName: ""
          # user:
          #   name: otel-secret
          #   key: user
          # password:
          #   name: otel-secret
          #   key: password
          # token:
          #   name: otel-secret
          #   key: token

        # -- TLS configuration for otel output.
        tls:
          # -- Allows enabling TLS for Otel output.
          enabled: false

          # -- Configuration for a custom CA store. If present, both secretKey and secretName fields are required.
          # ca:
          #   secretName: secret-tls-cert
          #   secretKey: ca.crt

          # -- Configuration for a client certificate. If present, both secretKey and secretName fields are required.
          # cert:
          #   secretName: secret-tls-cert
          #   secretKey: certificate.crt

          # -- Configuration for a key for the certificate file. If present, both secretKey and secretName fields are required.
          # key:
          #   secretName: secret-tls-cert
          #   secretKey: privateKey.key

          # -- Force certificate validation.
          # @default -- true
          # verify: true

          # -- Optional password for private key file.
          # keyPasswd: secret

# -- Mandatory values for Cloud Events Reader.
cloudEventsReader:
  # -- Allow disabling create Cloud Events Reader during deploy
  install: true

  # -- A docker image to use for Cloud Events Reader deployment.
  #
  # dockerImage: ghcr.io/netcracker/qubership-kube-events-reader:main

  # -- If specified, the pod's scheduling constraints
# Ref: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.35/#affinity-v1-core
  affinity: {}

  # -- Allow defines which Nodes the Pods are scheduled on.
  # nodeSelectorKey - key name
  # nodeSelectorValue - value
  # @default -- not set
  #
  # Example:
  # nodeSelectorKey: region
  # nodeSelectorValue: primary

  # -- PriorityClassName assigned to the Pods to prevent them from evicting.
  # priorityClassName: "priorityClassName"

  # -- Command line arguments
  #
  # args:
  #   - "-workers=2"
  #   - "-namespace=logging"
  #   - "-namespace=monitoring"
  #   - "-format={\"time\":\"{{.LastTimestamp.Format \"2006-01-02T15:04:05Z\"}}\""

  # -- The resources describe to compute resource requests and limits for single Pods.
  # Ref: https://kubernetes.io/docs/user-guide/compute-resources/
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 128Mi

# -- Mandatory values for Integration Tests.
integrationTests:
  # -- Allow disabling create Integration Tests Pod during deploy
  install: false

  # -- Service name for Integration Tests.
  service:
    name: logging-integration-tests-runner

  # -- Image of integration-tests
  # image: ghcr.io/netcracker/qubership-logging-integration-tests:main

  # -- Tags for Integration Tests. Possible values: smoke, graylog
  tags: smoke

  # -- The parameter specifies the timeout before the start of integration tests.
  timeoutBeforeStart: 100

  # -- Flag for specify kind of Graylog (internal in cloud or external on VM).
  externalGraylogServer: "true"

  # -- Graylog protocol.
  graylogProtocol: http

  # -- Graylog host. Example: 10.10.10.10 or graylog-service.graylog.svc
  # graylogHost:

  # -- Graylog port
  # graylogPort: 443

  # -- The resources describe to compute resource requests and limits for Integration Tests Pod.
  # Ref: https://kubernetes.io/docs/user-guide/compute-resources/
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m

  statusWriting:
    enabled: false
    isShortStatusMessage: true
    onlyIntegrationTests: true
    customResourcePath: "logging.netcracker.com/v1/logging-operator/loggingservices/logging-service"

  # -- PriorityClassName assigned to the Pods to prevent them from evicting.
  # priorityClassName: "priorityClassName"

  # -- The parameter specifies the user for ssh login to VM. Example: ubuntu
  vmUser: ""

  # -- The parameter specifies the ssh key for login to VM.
  sshKey: ""

  # -- VictoriaLogs connection settings
  victorialogs:
    # -- The parameter specifies the url for VictoriaLogs. Example : https://vlsingle-example.victorialogs:9428
    url: ""

    # -- Authentication for VictoriaLogs.
    auth: {}
      # user:
      #   secretName: ""
      #   key: ""
      # password:
      #   secretName: ""
      #   key: ""
      # token:
      #   secretName: ""
      #   key: ""
