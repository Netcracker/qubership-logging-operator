[FILTER]
    Name   lua
    Match  pods*
    script /fluent-bit/etc/extract_hostname.lua
    call   extract_hostname

# Count original fields before applying next filters
[FILTER]
    Name            lua
    Match_regex     (pods|klog).*
    Script          /fluent-bit/etc/count_fields.lua
    Call            first_count_fields

# Move non-conflicting parsed fields to the upper level
[FILTER]
    Name            nest
    Match_regex     (pods|klog).*
    Operation       lift
    Wildcard        log_parsed.*
    Nested_under    log_parsed
    Remove_prefix   log_parsed.

# Move conflicting parsed fields to the upper level with a parse_ prefix
[FILTER]
    Name            nest
    Match_regex     (pods|klog).*
    Operation       lift
    Nested_under    parsed_fields
    Add_prefix      parse_

[FILTER]
    Name            parser
    Match           klog*
    Key_Name        log
    Parser          klog_entry
    Reserve_Data    On
    Preserve_Key    On

[FILTER]
    Name            parser
    Match           klog*
    Key_Name        log
    Parser          klog_trace_entry
    Reserve_Data    On
    Preserve_Key    On
