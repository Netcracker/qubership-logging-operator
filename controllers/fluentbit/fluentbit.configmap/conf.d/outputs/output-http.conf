{{- if and .Values.Fluentbit.Output .Values.Fluentbit.Output.Http .Values.Fluentbit.Output.Http.Enabled }}
[FILTER]
    Name                   modify
    Match                  *
    Hard_rename            stream            log_category
{{- if and .Values.Fluentbit.Output.Http.Routing .Values.Fluentbit.Output.Http.Routing.Enabled }}
# Stream routing configuration for HTTP output
# As for now there's only option to use records tag as header and vmauth supports only static headers values,
# we need to use rewrite_tag filter to cut records' tags and leave only static prefix which will be used as header value.
# For example, if we have tag like "pods_audit" and we want to use "pods" as header value, we can use following rule:
[FILTER]
    Name                   rewrite_tag
    Match                  pods*
    Rule                   $nc_audit_label   true               out_audit        false
    Rule                   $kind             KubernetesEvent    out_k8s_event    false
    Rule                   $pod              .*ingress-nginx.*  out_nginx        false
    Rule                   $logType          access             out_access       false
    Rule                   $logType          int                out_int          false
    Rule                   $pod              ^.*$               out_pods         false
    emitter_mem_buf_limit  64M

[FILTER]
    Name                   rewrite_tag
    Match                  klog*
    Rule                   $nc_audit_label   true               out_audit        false
    Rule                   $pod              ^.*$               out_pods         false

[FILTER]
    Name                   rewrite_tag
    Match                  audit*
    Rule                   $TAG              ^audit.*$          out_audit        false

[FILTER]
    Name                   rewrite_tag
    Match                  system*
    Rule                   $TAG              ^system.*$         out_system       false

[FILTER]
    Name                   rewrite_tag
    Match_regex            ^(?!out_).*
    Rule                   $TAG              ^(?!out_).*$       out_default      false
{{- end }}

[OUTPUT]
    name                   http
    Match                  *
    host                   {{ .Values.Fluentbit.Output.Http.Host }}
    port                   {{ .Values.Fluentbit.Output.Http.Port | default 9428 }}
    uri                    {{ .Values.Fluentbit.Output.Http.Uri | default "/insert/jsonline?_stream_fields=namespace,container&_msg_field=short_message&_time_field=time" }}
    json_date_format       {{ .Values.Fluentbit.Output.Http.JsonDateFormat | default "iso8601" }}
    # Optional header to propagate log's tag which indicates the log type, default is "X-Log-Type". Used by vmauth for routing logs to different vlsingle instances
{{- if and .Values.Fluentbit.Output.Http.Routing .Values.Fluentbit.Output.Http.Routing.Enabled }}
    header_tag             {{ .Values.Fluentbit.Output.Http.Routing.HeaderTag | default "X-Log-Type" }}
{{- end }}
{{- if .Values.Fluentbit.Output.Http.Auth }}
{{- if .Values.Fluentbit.Output.Http.Auth.Token }}
    header                 Authorization    Bearer ${HTTP_TOKEN}
{{- end }}
{{- if and .Values.Fluentbit.Output.Http.Auth.User .Values.Fluentbit.Output.Http.Auth.Password }}
    http_user              ${HTTP_USERNAME}
    http_passwd            ${HTTP_PASSWORD}
{{- end }}
{{- end }}
    compress               {{ .Values.Fluentbit.Output.Http.Compress | default "gzip" }}
    format                 {{ .Values.Fluentbit.Output.Http.Format | default "json_lines" }}
{{- if .Values.Fluentbit.Output.Http.TLS }}
    tls                    {{ if .Values.Fluentbit.Output.Http.TLS.Enabled }}On{{ else }}Off{{ end }}
{{- if .Values.Fluentbit.Output.Http.TLS.Enabled }}
{{- if .Values.Fluentbit.Output.Http.TLS.Verify }}
    tls.verify             On
{{- else }}
    tls.verify             Off
{{- end }}
{{- if and .Values.Fluentbit.Output.Http.TLS.CA .Values.Fluentbit.Output.Http.TLS.CA.SecretName .Values.Fluentbit.Output.Http.TLS.CA.SecretKey }}
    tls.ca_file            /fluent-bit/output/http/tls/ca.crt
{{- end }}
{{- if and .Values.Fluentbit.Output.Http.TLS.Cert .Values.Fluentbit.Output.Http.TLS.Cert.SecretName .Values.Fluentbit.Output.Http.TLS.Cert.SecretKey }}
    tls.crt_file           /fluent-bit/output/http/tls/tls.crt
{{- end }}
{{- if and .Values.Fluentbit.Output.Http.TLS.Key .Values.Fluentbit.Output.Http.TLS.Key.SecretName .Values.Fluentbit.Output.Http.TLS.Key.SecretKey }}
    tls.key_file           /fluent-bit/output/http/tls/tls.key
{{- end }}
{{- if .Values.Fluentbit.Output.Http.TLS.KeyPasswd }}
    tls.key_passwd         {{ .Values.Fluentbit.Output.Http.TLS.KeyPasswd }}
{{- end -}}
{{- end -}}
{{- end -}}
{{ .Values.Fluentbit.Output.Http.ExtraParams | nindent 4 }}
{{- end }}
